<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}IntelliJobs{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <nav class="glass border-b border-slate-700 p-4 fixed w-full top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <a href="/" class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">IntelliJobs AI</a>
            <div id="nav-links" class="flex gap-4">
                <a href="/login" class="hover:text-blue-400 transition" id="nav-login">Login</a>
                <a href="/register" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg transition" id="nav-register">Register</a>
            </div>
        </div>
    </nav>
    <main class="flex-grow container mx-auto pt-24 px-4 pb-12">
        {% block content %}{% endblock %}
    </main>
    <script>
        const token = localStorage.getItem('token');
        const navLinks = document.getElementById('nav-links');
        if (token) {
            navLinks.innerHTML = `
                <a href="/dashboard" class="hover:text-blue-400 transition">Dashboard</a>
                <a href="/jobs" class="hover:text-blue-400 transition">Job Matches</a>
                <button onclick="logout()" class="text-red-400 hover:text-red-300 transition">Logout</button>
            `;
        }
        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/login';
        }
    </script>
</body>
</html>
