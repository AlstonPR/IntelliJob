{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto glass p-8 rounded-2xl mt-12 shadow-2xl">
    <h2 class="text-3xl font-bold mb-6 text-center">Welcome Back</h2>
    <form id="loginForm" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-slate-300 mb-1">Email</label>
            <input type="email" id="email" class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500" required>
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-300 mb-1">Password</label>
            <input type="password" id="password" class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500" required>
        </div>
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition mt-4">Login</button>
    </form>
    <p class="text-center mt-4 text-slate-400 text-sm">Don't have an account? <a href="/register" class="text-blue-400 hover:underline">Register</a></p>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        const formData = new URLSearchParams();
        formData.append('username', email);
        formData.append('password', password);

        const res = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: formData
        });

        if (res.ok) {
            const data = await res.json();
            localStorage.setItem('token', data.access_token);
            window.location.href = '/dashboard';
        } else {
            alert('Login failed. Check credentials.');
        }
    });
</script>
{% endblock %}
